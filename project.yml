name: Clipin
options:
  bundleIdPrefix: com.ccfco
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

targets:
  Clipin:
    type: application
    platform: macOS
    sources:
      - path: Clipin/App
      - path: Clipin/Views
        optional: true
      - path: Clipin/ViewModels
        optional: true
      - path: Clipin/Services
        optional: true
      - path: Clipin/Resources
        excludes:
          - Info.plist
        optional: true
      - path: Clipin/Generated
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ccfco.Clipin
        PRODUCT_NAME: Clipin
        INFOPLIST_FILE: Clipin/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Clipin/Clipin.entitlements
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/rust/target/release
        OTHER_LDFLAGS:
          - -lclipin_core
        SWIFT_INCLUDE_PATHS:
          - $(SRCROOT)/Clipin/Generated
        SWIFT_OBJC_BRIDGING_HEADER: Clipin/BridgingHeader.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Clipin/Generated
        MARKETING_VERSION: "0.1.5"
        CURRENT_PROJECT_VERSION: 5
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        SWIFT_VERSION: "6.0"
    preBuildScripts:
      - name: Build Rust Core
        script: |
          "${SRCROOT}/scripts/build-rust.sh"
        inputFiles:
          - $(SRCROOT)/scripts/build-rust.sh
          - $(SRCROOT)/rust/Cargo.toml
          - $(SRCROOT)/rust/Cargo.lock
          - $(SRCROOT)/rust/uniffi-bindgen.rs
          - $(SRCROOT)/rust/src/lib.rs
          - $(SRCROOT)/rust/src/models.rs
          - $(SRCROOT)/rust/src/storage.rs
        outputFiles:
          - $(SRCROOT)/rust/target/release/libclipin_core.a
          - $(SRCROOT)/Clipin/Generated/clipin_core.swift
          - $(SRCROOT)/Clipin/Generated/clipin_coreFFI.h
          - $(SRCROOT)/Clipin/Generated/clipin_coreFFI.modulemap
        basedOnDependencyAnalysis: true
