name: CI

on:
  pull_request:
  push:
    # 改成所有 branch 兜底：历史上只跟 main，feature branch push 不触发，
    # PR 触发也长期未生效（见 PR#3 review 期间排查）。
    # release tag push 默认不在 branches 范围内，不会重复跑。
    branches:
      - '**'

jobs:
  test:
    # macos-latest 当前仍指向 macOS 15，不带 macOS 26 SDK——而 Clipin 用到
    # NSGlassEffectView / .glass buttonStyle 等 Tahoe (macOS 26) 新 API，
    # 在老 SDK 上根本符号缺失。v0.1.7 CI 红就是这个原因。
    # 显式锁到 macos-26-arm64（默认 Xcode 26.2，能编译 macOS 26 SDK）。
    runs-on: macos-26-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 锁到 Xcode 26.4.1（与本地 macOS 26.4.1 同档），避免 runner 默认 26.2 漏掉
      # 26.3+ 引入的 AppKit 符号（NSGlassEffectView / .glass 在 26.0+，理论上 26.2
      # 已足够，但显式锁定避免未来 GitHub 升 default 时再次出现版本错配）。
      - name: Select Xcode 26.4.1
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Install Rust target
        run: rustup target add aarch64-apple-darwin

      - name: Rust tests
        run: |
          RUSTC="$(rustup which rustc)" rustup run stable cargo test --manifest-path rust/Cargo.toml --lib

      - name: Generate Xcode project
        run: xcodegen generate

      - name: macOS arm64 build
        run: |
          xcodebuild \
            -project Clipin.xcodeproj \
            -scheme Clipin \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Swift unit tests
        run: |
          xcodebuild \
            -project Clipin.xcodeproj \
            -scheme Clipin \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            test
